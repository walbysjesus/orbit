# Balanced debug profile for 4 GB machines: keep 2 GB cap but allow incremental builds.
org.gradle.jvmargs=-Xmx2048m -Xms256m -XX:+UseG1GC -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=192m -Dfile.encoding=UTF-8
org.gradle.workers.max=2
android.useAndroidX=true
kotlin.daemon.jvm.options=-Xmx512m
kotlin.compiler.execution.strategy=in-process
# Lock-safe local build profile.
org.gradle.daemon=false
org.gradle.parallel=true
org.gradle.configureondemand=true
org.gradle.caching=true
# Flutter's DebugMinSdkCheck task is not configuration-cache safe in this setup.
org.gradle.configuration-cache=false
org.gradle.configuration-cache.problems=warn
org.gradle.vfs.watch=false
kotlin.incremental=true
android.enableJetifier=false
kotlin.code.style=official

org.gradle.java.home=C:\\Program Files\\Java\\jdk-17
