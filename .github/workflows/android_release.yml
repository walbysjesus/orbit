name: Android Release Pipeline

on:
  workflow_run:
    workflows:
      - Flutter CI
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: android-release-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight-secrets:
    name: Check Signing Secrets
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      missing: ${{ steps.check.outputs.missing }}

    steps:
      - name: Check required secrets
        id: check
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()

          for secret_name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD; do
            if [ -z "${!secret_name:-}" ]; then
              missing+=("$secret_name")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "missing=${missing[*]}" >> "$GITHUB_OUTPUT"
            echo "::error::Missing required Android signing secrets: ${missing[*]}"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "missing=" >> "$GITHUB_OUTPUT"
            echo "All required Android signing secrets are configured."
          fi

  build-android-release:
    name: Sign and Build APK/AAB
    needs: preflight-secrets
    if: ${{ needs.preflight-secrets.outputs.ready == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      FLUTTER_VERSION: stable
      JAVA_VERSION: "17"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Compute Build Metadata
        shell: bash
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          BUILD_NAME="1.0.${{ github.run_number }}-${GITHUB_SHA::7}"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "BUILD_NAME=$BUILD_NAME" >> "$GITHUB_ENV"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Restore Pub Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Dependencies
        run: flutter pub get

      - name: Environment Diagnostics
        shell: bash
        run: |
          set -euo pipefail
          java -version
          flutter --version

      - name: Dependency Vulnerability Scan (OSV)
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 \
            -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
          osv-scanner --lockfile=pubspec.lock

      - name: Prepare Keystore and key.properties
        shell: bash
        run: |
          set -euo pipefail
          # Normalize secrets to avoid hidden CR/LF or surrounding spaces in GitHub Secrets.
          CLEAN_KEYSTORE_BASE64="$(printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '\r\n[:space:]')"
          CLEAN_STORE_PASSWORD="$(printf '%s' "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          CLEAN_KEY_PASSWORD="$(printf '%s' "${{ secrets.ANDROID_KEY_PASSWORD }}" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          CLEAN_KEY_ALIAS="$(printf '%s' "${{ secrets.ANDROID_KEY_ALIAS }}" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          if [ -z "$CLEAN_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is empty after normalization"
            exit 1
          fi
          if [ -z "$CLEAN_STORE_PASSWORD" ] || [ -z "$CLEAN_KEY_PASSWORD" ] || [ -z "$CLEAN_KEY_ALIAS" ]; then
            echo "::error::One or more signing secrets are empty after normalization"
            exit 1
          fi

          if ! printf '%s' "$CLEAN_KEYSTORE_BASE64" | base64 --decode > android/keystore.jks 2>/tmp/keystore_decode.err; then
            echo "::error::Failed to decode ANDROID_KEYSTORE_BASE64. Verify it is valid base64 from a .jks file."
            cat /tmp/keystore_decode.err || true
            exit 1
          fi

          test -s android/keystore.jks || (echo "::error::Generated android/keystore.jks is missing or empty" && exit 1)
          cat > android/key.properties <<EOF
          storePassword=$CLEAN_STORE_PASSWORD
          keyPassword=$CLEAN_KEY_PASSWORD
          keyAlias=$CLEAN_KEY_ALIAS
          storeFile=../keystore.jks
          EOF

          if ! keytool -list -keystore android/keystore.jks \
            -storepass "$CLEAN_STORE_PASSWORD" >/dev/null 2>/tmp/keystore_list.err; then
            echo "::error::Keystore read failed. Check ANDROID_KEYSTORE_PASSWORD and keystore integrity."
            cat /tmp/keystore_list.err || true
            exit 1
          fi

          if ! keytool -list -keystore android/keystore.jks \
            -storepass "$CLEAN_STORE_PASSWORD" \
            -alias "$CLEAN_KEY_ALIAS" >/dev/null 2>/tmp/keystore_alias.err; then
            echo "::error::Alias not found or inaccessible. Check ANDROID_KEY_ALIAS and ANDROID_KEY_PASSWORD."
            cat /tmp/keystore_alias.err || true
            exit 1
          fi

      - name: Build Signed Release APK (optimized)
        shell: bash
        run: |
          set -euo pipefail
          flutter build apk \
            --release \
            --build-number "$BUILD_NUMBER" \
            --build-name "$BUILD_NAME" \
            --tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/symbols \
            2>&1 | tee build_apk_release.log

      - name: Build Signed Release App Bundle (AAB)
        shell: bash
        run: |
          set -euo pipefail
          flutter build appbundle \
            --release \
            --build-number "$BUILD_NUMBER" \
            --build-name "$BUILD_NAME" \
            --tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/symbols \
            2>&1 | tee build_aab_release.log

      - name: Upload Diagnostic Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-logs
          path: |
            build_apk_release.log
            build_aab_release.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbit-release-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload AAB Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbit-release-aab
          path: |
            build/app/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 14

      - name: Upload Obfuscation Symbols
        uses: actions/upload-artifact@v4
        with:
          name: orbit-obfuscation-symbols
          path: build/symbols/**
          if-no-files-found: warn
          retention-days: 14

      - name: Cleanup Signing Material
        if: always()
        shell: bash
        run: |
          rm -f android/key.properties android/keystore.jks

  release-skipped:
    name: Android Release Skipped
    needs: preflight-secrets
    if: ${{ (github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')) && needs.preflight-secrets.outputs.ready != 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Explain skipped release
        shell: bash
        run: |
          echo "::error::Android release blocked. Missing secrets: ${{ needs.preflight-secrets.outputs.missing }}"
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            exit 1
          fi
          echo "Manual run detected; not failing hard."
