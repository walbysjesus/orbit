name: Android Release Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight-secrets:
    name: Check Signing Secrets
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}

    steps:
      - name: Check required secrets
        id: check
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()

          for secret_name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD; do
            if [ -z "${!secret_name:-}" ]; then
              missing+=("$secret_name")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Android release. Missing secrets: ${missing[*]}"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "All required Android signing secrets are configured."
          fi

  build-android-release:
    name: Analyze, Test, Sign, Build APK/AAB
    needs: preflight-secrets
    if: ${{ needs.preflight-secrets.outputs.ready == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      FLUTTER_VERSION: stable
      JAVA_VERSION: "17"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute Build Metadata
        shell: bash
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          BUILD_NAME="1.0.${{ github.run_number }}-${GITHUB_SHA::7}"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "BUILD_NAME=$BUILD_NAME" >> "$GITHUB_ENV"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Restore Pub Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Dependencies
        run: flutter pub get

      - name: Dependency Vulnerability Scan (OSV)
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 \
            -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
          osv-scanner --lockfile=pubspec.lock

      - name: Static Analysis
        run: flutter analyze

      - name: Automated Tests
        run: flutter test --reporter expanded

      - name: Prepare Keystore and key.properties
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../keystore.jks
          EOF

      - name: Build Signed Release APK (optimized)
        shell: bash
        run: |
          set -euo pipefail
          flutter build apk \
            --release \
            --build-number "$BUILD_NUMBER" \
            --build-name "$BUILD_NAME" \
            --split-per-abi \
            --tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/symbols

      - name: Build Signed Release App Bundle (AAB)
        shell: bash
        run: |
          set -euo pipefail
          flutter build appbundle \
            --release \
            --build-number "$BUILD_NUMBER" \
            --build-name "$BUILD_NAME" \
            --tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/symbols

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbit-release-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload AAB Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbit-release-aab
          path: |
            build/app/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 14

      - name: Upload Obfuscation Symbols
        uses: actions/upload-artifact@v4
        with:
          name: orbit-obfuscation-symbols
          path: build/symbols/**
          if-no-files-found: warn
          retention-days: 14

      - name: Cleanup Signing Material
        if: always()
        shell: bash
        run: |
          rm -f android/key.properties android/keystore.jks

  release-skipped:
    name: Android Release Skipped
    needs: preflight-secrets
    if: ${{ needs.preflight-secrets.outputs.ready != 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Explain skipped release
        shell: bash
        run: |
          echo "Android release skipped because signing secrets are not configured for this repository."
