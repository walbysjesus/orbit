name: Firebase App Distribution

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-distribution-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight-secrets:
    name: Check Release Secrets
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      missing: ${{ steps.check.outputs.missing }}

    steps:
      - name: Check required secrets
        id: check
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
        run: |
          set -euo pipefail
          missing=()

          for secret_name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD \
            FIREBASE_TOKEN \
            FIREBASE_APP_ID_ANDROID; do
            if [ -z "${!secret_name:-}" ]; then
              missing+=("$secret_name")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "missing=${missing[*]}" >> "$GITHUB_OUTPUT"
            echo "::error::Missing required secrets for Firebase distribution: ${missing[*]}"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "missing=" >> "$GITHUB_OUTPUT"
            echo "All required Firebase distribution secrets are configured."
          fi

  distribute-android:
    name: Build and Distribute Signed APK
    needs: preflight-secrets
    if: ${{ needs.preflight-secrets.outputs.ready == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      JAVA_VERSION: "17"
      FLUTTER_CHANNEL: stable
      APK_PATH: build/app/outputs/flutter-apk/app-release.apk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Restore Pub Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Dependencies
        run: flutter pub get

      - name: Environment Diagnostics
        shell: bash
        run: |
          set -euo pipefail
          java -version
          flutter --version
          flutter --version --machine | head -c 400 || true

      - name: Prepare Android Signing Files
        shell: bash
        run: |
          set -euo pipefail
          # Normalize secrets to avoid hidden CR/LF or surrounding spaces in GitHub Secrets.
          CLEAN_KEYSTORE_BASE64="$(printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '\r\n[:space:]')"
          CLEAN_STORE_PASSWORD="$(printf '%s' "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          CLEAN_KEY_PASSWORD="$(printf '%s' "${{ secrets.ANDROID_KEY_PASSWORD }}" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          CLEAN_KEY_ALIAS="$(printf '%s' "${{ secrets.ANDROID_KEY_ALIAS }}" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          if [ -z "$CLEAN_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is empty after normalization"
            exit 1
          fi
          if [ -z "$CLEAN_STORE_PASSWORD" ] || [ -z "$CLEAN_KEY_PASSWORD" ] || [ -z "$CLEAN_KEY_ALIAS" ]; then
            echo "::error::One or more signing secrets are empty after normalization"
            exit 1
          fi

          if ! printf '%s' "$CLEAN_KEYSTORE_BASE64" | base64 --decode > android/keystore.jks 2>/tmp/keystore_decode.err; then
            echo "::error::Failed to decode ANDROID_KEYSTORE_BASE64. Verify it is valid base64 from a .jks file."
            cat /tmp/keystore_decode.err || true
            exit 1
          fi

          test -s android/keystore.jks || (echo "::error::Generated android/keystore.jks is missing or empty" && exit 1)
          cat > android/key.properties <<EOF
          storePassword=$CLEAN_STORE_PASSWORD
          keyPassword=$CLEAN_KEY_PASSWORD
          keyAlias=$CLEAN_KEY_ALIAS
          storeFile=../keystore.jks
          EOF

          if ! keytool -list -keystore android/keystore.jks \
            -storepass "$CLEAN_STORE_PASSWORD" >/dev/null 2>/tmp/keystore_list.err; then
            echo "::error::Keystore read failed. Check ANDROID_KEYSTORE_PASSWORD and keystore integrity."
            cat /tmp/keystore_list.err || true
            exit 1
          fi

          if ! keytool -list -keystore android/keystore.jks \
            -storepass "$CLEAN_STORE_PASSWORD" \
            -alias "$CLEAN_KEY_ALIAS" >/dev/null 2>/tmp/keystore_alias.err; then
            echo "::error::Alias not found or inaccessible. Check ANDROID_KEY_ALIAS and ANDROID_KEY_PASSWORD."
            cat /tmp/keystore_alias.err || true
            exit 1
          fi

      - name: Static Analysis
        shell: bash
        run: |
          set -euo pipefail
          flutter analyze 2>&1 | tee analyze.log

      - name: Automated Tests
        shell: bash
        run: |
          set -euo pipefail
          flutter test --reporter expanded 2>&1 | tee test.log

      - name: Build Signed Release APK (optimized)
        shell: bash
        run: |
          set -euo pipefail
          flutter build apk \
            --release \
            --tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/symbols \
            2>&1 | tee build_apk.log

      - name: Verify APK Exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "${{ env.APK_PATH }}" || (echo "APK not found at ${{ env.APK_PATH }}" && exit 1)
          ls -lh "${{ env.APK_PATH }}"

      - name: Setup Firebase CLI
        shell: bash
        run: |
          set -euo pipefail
          npm install -g firebase-tools
          firebase --version

      - name: Distribute to Firebase App Distribution
        shell: bash
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          FIREBASE_TESTER_GROUPS: ${{ secrets.FIREBASE_TESTER_GROUPS }}
        run: |
          set -euo pipefail
          RELEASE_NOTES="CI build ${GITHUB_SHA::7} from ${GITHUB_REF_NAME}"

          if [[ ! "$FIREBASE_APP_ID_ANDROID" =~ ^[0-9]+:[0-9]+:android:[a-f0-9]+$ ]]; then
            echo "::error::FIREBASE_APP_ID_ANDROID has invalid format: $FIREBASE_APP_ID_ANDROID"
            exit 1
          fi

          if [ -n "${FIREBASE_TESTER_GROUPS:-}" ]; then
            firebase appdistribution:distribute "${{ env.APK_PATH }}" \
              --app "$FIREBASE_APP_ID_ANDROID" \
              --token "$FIREBASE_TOKEN" \
              --release-notes "$RELEASE_NOTES" \
              --groups "$FIREBASE_TESTER_GROUPS" \
              2>&1 | tee firebase_distribution.log
          else
            firebase appdistribution:distribute "${{ env.APK_PATH }}" \
              --app "$FIREBASE_APP_ID_ANDROID" \
              --token "$FIREBASE_TOKEN" \
              --release-notes "$RELEASE_NOTES" \
              2>&1 | tee firebase_distribution.log
          fi

      - name: Upload Diagnostic Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-distribution-logs
          path: |
            analyze.log
            test.log
            build_apk.log
            firebase_distribution.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firebase-distribution-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/symbols/**
          if-no-files-found: warn
          retention-days: 14

      - name: Cleanup Sensitive Files
        if: always()
        shell: bash
        run: |
          rm -f android/key.properties android/keystore.jks

  distribution-skipped:
    name: Firebase Distribution Skipped
    needs: preflight-secrets
    if: ${{ needs.preflight-secrets.outputs.ready != 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Explain skipped release
        shell: bash
        run: |
          echo "::error::Firebase distribution blocked. Missing secrets: ${{ needs.preflight-secrets.outputs.missing }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            exit 1
          fi
          echo "Manual run detected; not failing hard."
