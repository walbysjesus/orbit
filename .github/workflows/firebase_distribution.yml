name: Firebase App Distribution

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-distribution-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight-secrets:
    name: Check Release Secrets
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      missing: ${{ steps.check.outputs.missing }}

    steps:
      - name: Check required secrets
        id: check
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
        run: |
          set -euo pipefail
          missing=()

          for secret_name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD \
            FIREBASE_SERVICE_ACCOUNT_JSON \
            FIREBASE_APP_ID_ANDROID; do
            if [ -z "${!secret_name:-}" ]; then
              missing+=("$secret_name")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "missing=${missing[*]}" >> "$GITHUB_OUTPUT"
            echo "::error::Missing required secrets for Firebase distribution: ${missing[*]}"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "missing=" >> "$GITHUB_OUTPUT"
            echo "All required Firebase distribution secrets are configured."
          fi

  distribute-android:
    name: Build and Distribute Signed APK
    needs: preflight-secrets
    if: ${{ needs.preflight-secrets.outputs.ready == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      JAVA_VERSION: "17"
      FLUTTER_CHANNEL: stable
      APK_PATH: build/app/outputs/flutter-apk/app-release.apk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Restore Pub Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Dependencies
        run: flutter pub get

      - name: Environment Diagnostics
        shell: bash
        run: |
          set -euo pipefail
          java -version
          flutter --version
          flutter --version --machine | head -c 400 || true

      - name: Prepare Android Signing Files
        shell: bash
        run: |
          set -euo pipefail
          # Normalize secrets to avoid hidden CR/LF or surrounding spaces in GitHub Secrets.
          CLEAN_KEYSTORE_BASE64="$(printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '\r\n[:space:]')"
          CLEAN_STORE_PASSWORD="$(printf '%s' "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          CLEAN_KEY_PASSWORD="$(printf '%s' "${{ secrets.ANDROID_KEY_PASSWORD }}" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          CLEAN_KEY_ALIAS="$(printf '%s' "${{ secrets.ANDROID_KEY_ALIAS }}" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          if [ -z "$CLEAN_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is empty after normalization"
            exit 1
          fi
          if [ -z "$CLEAN_STORE_PASSWORD" ] || [ -z "$CLEAN_KEY_PASSWORD" ] || [ -z "$CLEAN_KEY_ALIAS" ]; then
            echo "::error::One or more signing secrets are empty after normalization"
            exit 1
          fi

          if ! printf '%s' "$CLEAN_KEYSTORE_BASE64" | base64 --decode > android/keystore.jks 2>/tmp/keystore_decode.err; then
            echo "::error::Failed to decode ANDROID_KEYSTORE_BASE64. Verify it is valid base64 from a .jks file."
            cat /tmp/keystore_decode.err || true
            exit 1
          fi

          test -s android/keystore.jks || (echo "::error::Generated android/keystore.jks is missing or empty" && exit 1)
          cat > android/key.properties <<EOF
          storePassword=$CLEAN_STORE_PASSWORD
          keyPassword=$CLEAN_KEY_PASSWORD
          keyAlias=$CLEAN_KEY_ALIAS
          storeFile=../keystore.jks
          EOF

          if ! keytool -list -keystore android/keystore.jks \
            -storepass "$CLEAN_STORE_PASSWORD" >/dev/null 2>/tmp/keystore_list.err; then
            echo "::error::Keystore read failed. Check ANDROID_KEYSTORE_PASSWORD and keystore integrity."
            cat /tmp/keystore_list.err || true
            exit 1
          fi

          if ! keytool -list -keystore android/keystore.jks \
            -storepass "$CLEAN_STORE_PASSWORD" \
            -alias "$CLEAN_KEY_ALIAS" >/dev/null 2>/tmp/keystore_alias.err; then
            echo "::error::Alias not found or inaccessible. Check ANDROID_KEY_ALIAS and ANDROID_KEY_PASSWORD."
            cat /tmp/keystore_alias.err || true
            exit 1
          fi

      - name: Static Analysis
        shell: bash
        run: |
          set -euo pipefail
          flutter analyze 2>&1 | tee analyze.log

      - name: Automated Tests
        shell: bash
        run: |
          set -euo pipefail
          flutter test --reporter expanded 2>&1 | tee test.log

      - name: Build Signed Release APK (optimized)
        shell: bash
        run: |
          set -euo pipefail
          flutter build apk \
            --release \
            --tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/symbols \
            2>&1 | tee build_apk.log

      - name: Verify APK Exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "${{ env.APK_PATH }}" || (echo "APK not found at ${{ env.APK_PATH }}" && exit 1)
          ls -lh "${{ env.APK_PATH }}"

      - name: Setup Firebase CLI
        shell: bash
        run: |
          set -euo pipefail
          npm install -g firebase-tools
          firebase --version

      - name: Prepare Firebase Credentials
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/firebase"
          CREDENTIALS_PATH="$RUNNER_TEMP/firebase/service-account.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$CREDENTIALS_PATH"

          if ! jq -e '.type == "service_account" and .client_email and .private_key and .project_id' "$CREDENTIALS_PATH" >/dev/null; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_JSON is not a valid service account JSON"
            exit 1
          fi

          SA_PROJECT_ID=$(jq -r '.project_id' "$CREDENTIALS_PATH")
          if [ -z "$SA_PROJECT_ID" ] || [ "$SA_PROJECT_ID" = "null" ]; then
            echo "::error::Unable to resolve project_id from FIREBASE_SERVICE_ACCOUNT_JSON"
            exit 1
          fi

          echo "SA_PROJECT_ID=$SA_PROJECT_ID" >> "$GITHUB_ENV"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDENTIALS_PATH" >> "$GITHUB_ENV"

      - name: Validate Firebase App ID Mapping
        shell: bash
        env:
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
        run: |
          set -euo pipefail
          EXPECTED_APP_ID=$(grep -m1 '"mobilesdk_app_id"' android/app/google-services.json | sed -E 's/.*: "([^"]+)".*/\1/')
          EXPECTED_PACKAGE_NAME=$(grep -m1 '"package_name"' android/app/google-services.json | sed -E 's/.*: "([^"]+)".*/\1/')
          GRADLE_APPLICATION_ID=$(grep -m1 'applicationId = ' android/app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')

          if [ -z "$EXPECTED_APP_ID" ] || [ -z "$EXPECTED_PACKAGE_NAME" ] || [ -z "$GRADLE_APPLICATION_ID" ]; then
            echo "::error::Failed to resolve Firebase/Android identifiers from repository files"
            exit 1
          fi

          if [ "$EXPECTED_PACKAGE_NAME" != "$GRADLE_APPLICATION_ID" ]; then
            echo "::error::android/app/google-services.json package ($EXPECTED_PACKAGE_NAME) does not match Gradle applicationId ($GRADLE_APPLICATION_ID)"
            exit 1
          fi

          if [ "$FIREBASE_APP_ID_ANDROID" != "$EXPECTED_APP_ID" ]; then
            echo "::error::FIREBASE_APP_ID_ANDROID mismatch. Expected $EXPECTED_APP_ID (package $EXPECTED_PACKAGE_NAME), got $FIREBASE_APP_ID_ANDROID"
            exit 1
          fi

      - name: Validate Firebase Project Access and App Existence
        shell: bash
        env:
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
        run: |
          set -euo pipefail
          EXPECTED_PROJECT_ID=$(jq -r '.project_info.project_id // empty' android/app/google-services.json)

          if [ -z "$EXPECTED_PROJECT_ID" ]; then
            echo "::error::Unable to resolve project_info.project_id from android/app/google-services.json"
            exit 1
          fi

          if [ "${SA_PROJECT_ID:-}" != "$EXPECTED_PROJECT_ID" ]; then
            echo "::error::Service account project mismatch. google-services.json uses '$EXPECTED_PROJECT_ID' but FIREBASE_SERVICE_ACCOUNT_JSON uses '${SA_PROJECT_ID:-unset}'."
            exit 1
          fi

          if ! firebase apps:list --project "$EXPECTED_PROJECT_ID" --json > firebase_apps.json 2>/tmp/firebase_apps_list.err; then
            echo "::error::Unable to list Firebase apps for project '$EXPECTED_PROJECT_ID'. Ensure the service account has Firebase Admin/App Distribution permissions."
            cat /tmp/firebase_apps_list.err || true
            exit 1
          fi

          if ! jq -e --arg app_id "$FIREBASE_APP_ID_ANDROID" '.result[]? | select(.appId == $app_id)' firebase_apps.json >/dev/null; then
            echo "::error::FIREBASE_APP_ID_ANDROID '$FIREBASE_APP_ID_ANDROID' does not exist in Firebase project '$EXPECTED_PROJECT_ID' (or App Distribution is not onboarded)."
            echo "Available app IDs in this project:"
            jq -r '.result[]?.appId' firebase_apps.json || true
            exit 1
          fi

      - name: Distribute to Firebase App Distribution
        shell: bash
        env:
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          FIREBASE_TESTER_GROUPS: ${{ secrets.FIREBASE_TESTER_GROUPS }}
        run: |
          set -euo pipefail
          RELEASE_NOTES="CI build ${GITHUB_SHA::7} from ${GITHUB_REF_NAME}"

          if [[ ! "$FIREBASE_APP_ID_ANDROID" =~ ^[0-9]+:[0-9]+:android:[a-f0-9]+$ ]]; then
            echo "::error::FIREBASE_APP_ID_ANDROID has invalid format: $FIREBASE_APP_ID_ANDROID"
            exit 1
          fi

          if [ -n "${FIREBASE_TESTER_GROUPS:-}" ]; then
            firebase appdistribution:distribute "${{ env.APK_PATH }}" \
              --app "$FIREBASE_APP_ID_ANDROID" \
              --release-notes "$RELEASE_NOTES" \
              --groups "$FIREBASE_TESTER_GROUPS" \
              2>&1 | tee firebase_distribution.log
          else
            firebase appdistribution:distribute "${{ env.APK_PATH }}" \
              --app "$FIREBASE_APP_ID_ANDROID" \
              --release-notes "$RELEASE_NOTES" \
              2>&1 | tee firebase_distribution.log
          fi

      - name: Upload Diagnostic Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-distribution-logs
          path: |
            analyze.log
            test.log
            build_apk.log
            firebase_distribution.log
            firebase_apps.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firebase-distribution-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/symbols/**
          if-no-files-found: warn
          retention-days: 14

      - name: Cleanup Sensitive Files
        if: always()
        shell: bash
        run: |
          rm -f android/key.properties android/keystore.jks
          if [ -n "${GOOGLE_APPLICATION_CREDENTIALS:-}" ]; then
            rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
          fi

  distribution-skipped:
    name: Firebase Distribution Skipped
    needs: preflight-secrets
    if: ${{ needs.preflight-secrets.outputs.ready != 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Explain skipped release
        shell: bash
        run: |
          echo "::error::Firebase distribution blocked. Missing secrets: ${{ needs.preflight-secrets.outputs.missing }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            exit 1
          fi
          echo "Manual run detected; not failing hard."
