name: Firebase App Distribution

on:
  workflow_run:
    workflows:
      - Android Release Pipeline
    types:
      - completed
  workflow_dispatch:
    inputs:
      android_release_run_id:
        description: Android Release workflow run id to fetch APK artifact from
        required: false
        type: string

concurrency:
  group: firebase-distribution-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  preflight-secrets:
    name: Check Release Secrets
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      missing: ${{ steps.check.outputs.missing }}

    steps:
      - name: Check required secrets
        id: check
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
        run: |
          set -euo pipefail
          missing=()

          for secret_name in \
            FIREBASE_SERVICE_ACCOUNT_JSON \
            FIREBASE_APP_ID_ANDROID; do
            if [ -z "${!secret_name:-}" ]; then
              missing+=("$secret_name")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "missing=${missing[*]}" >> "$GITHUB_OUTPUT"
            echo "::error::Missing required secrets for Firebase distribution: ${missing[*]}"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "missing=" >> "$GITHUB_OUTPUT"
            echo "All required Firebase distribution secrets are configured."
          fi

  distribute-android:
    name: Distribute Existing Release APK
    needs: preflight-secrets
    if: ${{ needs.preflight-secrets.outputs.ready == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      APK_ARTIFACT_NAME: orbit-release-apk
      APK_DIR: downloaded-apk

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve Android Release Run ID
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.android_release_run_id || '' }}" ]; then
            echo "RELEASE_RUN_ID=${{ inputs.android_release_run_id }}" >> "$GITHUB_ENV"
          elif [ -n "${{ github.event.workflow_run.id || '' }}" ]; then
            echo "RELEASE_RUN_ID=${{ github.event.workflow_run.id }}" >> "$GITHUB_ENV"
          else
            echo "::error::No Android Release run id provided. Use workflow_dispatch input android_release_run_id."
            exit 1
          fi

      - name: Download APK Artifact From Android Release
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ env.RELEASE_RUN_ID }}
          name: ${{ env.APK_ARTIFACT_NAME }}
          path: ${{ env.APK_DIR }}

      - name: Resolve APK Path
        shell: bash
        run: |
          set -euo pipefail
          # Prefer arm64 if multiple APKs exist (split-per-abi)
          APK_PATH=$(ls -1 "${{ env.APK_DIR }}"/*arm64*.apk 2>/dev/null | head -n 1 || true)
          if [ -z "${APK_PATH}" ]; then
            APK_PATH=$(ls -1 "${{ env.APK_DIR }}"/*.apk 2>/dev/null | head -n 1 || true)
          fi
          if [ -z "${APK_PATH}" ]; then
            echo "::error::No APK found in '${{ env.APK_DIR }}'."
            ls -la "${{ env.APK_DIR }}" || true
            exit 1
          fi
          echo "APK_PATH=${APK_PATH}" >> "$GITHUB_ENV"
          ls -lh "${APK_PATH}"

      - name: Setup Firebase CLI
        shell: bash
        run: |
          set -euo pipefail
          npm install -g firebase-tools
          firebase --version

      - name: Prepare Firebase Credentials
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/firebase"
          CREDENTIALS_PATH="$RUNNER_TEMP/firebase/service-account.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$CREDENTIALS_PATH"

          if ! jq -e '.type == "service_account" and .client_email and .private_key and .project_id' "$CREDENTIALS_PATH" >/dev/null; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_JSON is not a valid service account JSON"
            exit 1
          fi

          SA_PROJECT_ID=$(jq -r '.project_id' "$CREDENTIALS_PATH")
          if [ -z "$SA_PROJECT_ID" ] || [ "$SA_PROJECT_ID" = "null" ]; then
            echo "::error::Unable to resolve project_id from FIREBASE_SERVICE_ACCOUNT_JSON"
            exit 1
          fi

          echo "SA_PROJECT_ID=$SA_PROJECT_ID" >> "$GITHUB_ENV"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDENTIALS_PATH" >> "$GITHUB_ENV"

      - name: Validate Firebase App ID Mapping
        shell: bash
        env:
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
        run: |
          set -euo pipefail
          EXPECTED_APP_ID=$(grep -m1 '"mobilesdk_app_id"' android/app/google-services.json | sed -E 's/.*: "([^"]+)".*/\1/')
          EXPECTED_PACKAGE_NAME=$(grep -m1 '"package_name"' android/app/google-services.json | sed -E 's/.*: "([^"]+)".*/\1/')
          GRADLE_APPLICATION_ID=$(grep -m1 'applicationId = ' android/app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')

          if [ -z "$EXPECTED_APP_ID" ] || [ -z "$EXPECTED_PACKAGE_NAME" ] || [ -z "$GRADLE_APPLICATION_ID" ]; then
            echo "::error::Failed to resolve Firebase/Android identifiers from repository files"
            exit 1
          fi

          if [ "$EXPECTED_PACKAGE_NAME" != "$GRADLE_APPLICATION_ID" ]; then
            echo "::error::android/app/google-services.json package ($EXPECTED_PACKAGE_NAME) does not match Gradle applicationId ($GRADLE_APPLICATION_ID)"
            exit 1
          fi

          if [ "$FIREBASE_APP_ID_ANDROID" != "$EXPECTED_APP_ID" ]; then
            echo "::error::FIREBASE_APP_ID_ANDROID mismatch. Expected $EXPECTED_APP_ID (package $EXPECTED_PACKAGE_NAME), got $FIREBASE_APP_ID_ANDROID"
            exit 1
          fi

      - name: Validate Firebase Project Access and App Existence
        shell: bash
        env:
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
        run: |
          set -euo pipefail
          EXPECTED_PROJECT_ID=$(jq -r '.project_info.project_id // empty' android/app/google-services.json)

          if [ -z "$EXPECTED_PROJECT_ID" ]; then
            echo "::error::Unable to resolve project_info.project_id from android/app/google-services.json"
            exit 1
          fi

          if [ "${SA_PROJECT_ID:-}" != "$EXPECTED_PROJECT_ID" ]; then
            echo "::error::Service account project mismatch. google-services.json uses '$EXPECTED_PROJECT_ID' but FIREBASE_SERVICE_ACCOUNT_JSON uses '${SA_PROJECT_ID:-unset}'."
            exit 1
          fi

          if ! firebase apps:list --project "$EXPECTED_PROJECT_ID" --json > firebase_apps.json 2>/tmp/firebase_apps_list.err; then
            echo "::error::Unable to list Firebase apps for project '$EXPECTED_PROJECT_ID'. Ensure the service account has Firebase Admin/App Distribution permissions."
            cat /tmp/firebase_apps_list.err || true
            exit 1
          fi

          if ! jq -e --arg app_id "$FIREBASE_APP_ID_ANDROID" '.result[]? | select(.appId == $app_id)' firebase_apps.json >/dev/null; then
            echo "::error::FIREBASE_APP_ID_ANDROID '$FIREBASE_APP_ID_ANDROID' does not exist in Firebase project '$EXPECTED_PROJECT_ID' (or App Distribution is not onboarded)."
            echo "Available app IDs in this project:"
            jq -r '.result[]?.appId' firebase_apps.json || true
            exit 1
          fi

      - name: Distribute to Firebase App Distribution
        shell: bash
        env:
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          FIREBASE_TESTER_GROUPS: ${{ secrets.FIREBASE_TESTER_GROUPS }}
        run: |
          set -euo pipefail
          RELEASE_NOTES="CI build ${GITHUB_SHA::7} from ${GITHUB_REF_NAME}"

          if [[ ! "$FIREBASE_APP_ID_ANDROID" =~ ^[0-9]+:[0-9]+:android:[a-f0-9]+$ ]]; then
            echo "::error::FIREBASE_APP_ID_ANDROID has invalid format: $FIREBASE_APP_ID_ANDROID"
            exit 1
          fi

          if [ -n "${FIREBASE_TESTER_GROUPS:-}" ]; then
            firebase appdistribution:distribute "${{ env.APK_PATH }}" \
              --app "$FIREBASE_APP_ID_ANDROID" \
              --release-notes "$RELEASE_NOTES" \
              --groups "$FIREBASE_TESTER_GROUPS" \
              2>&1 | tee firebase_distribution.log
          else
            firebase appdistribution:distribute "${{ env.APK_PATH }}" \
              --app "$FIREBASE_APP_ID_ANDROID" \
              --release-notes "$RELEASE_NOTES" \
              2>&1 | tee firebase_distribution.log
          fi

      - name: Upload Diagnostic Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-distribution-logs
          path: |
            firebase_distribution.log
            firebase_apps.json
          if-no-files-found: warn
          retention-days: 14

      - name: Cleanup Sensitive Files
        if: always()
        shell: bash
        run: |
          if [ -n "${GOOGLE_APPLICATION_CREDENTIALS:-}" ]; then
            rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
          fi

  distribution-skipped:
    name: Firebase Distribution Skipped
    needs: preflight-secrets
    if: ${{ (github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')) && needs.preflight-secrets.outputs.ready != 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Explain skipped release
        shell: bash
        run: |
          echo "::error::Firebase distribution blocked. Missing secrets: ${{ needs.preflight-secrets.outputs.missing }}"
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            exit 1
          fi
          echo "Manual run detected; not failing hard."

