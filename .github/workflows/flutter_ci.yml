# Simple GitHub Actions workflow for Flutter CI
name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib test
      - run: flutter analyze
      - run: flutter test --coverage --reporter=expanded
      # - run: flutter build apk --release # Descomenta para builds automáticos
      # - run: flutter build ios --release # Descomenta solo con MacOS executor
